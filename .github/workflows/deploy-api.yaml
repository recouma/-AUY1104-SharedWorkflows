name: Subir la API a Docker Hub (receta reutilizable)

on:
  workflow_call:
    inputs:
      image-name:
        description: Nombre de la imagen en Docker Hub (sin usuario)
        required: true
        type: string
      image-tag:
        description: Etiqueta de versión (ej. v1.0.0)
        required: true
        type: string
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true
  workflow_dispatch:
    inputs:
      image-name:
        description: Nombre corto de la imagen (ej. mi-api)
        required: true
        type: string
      image-tag:
        description: Etiqueta de esta versión (ej. v1.0.0)
        required: true
        type: string

jobs:
  deps-and-test:
    name: Dependencies and tests
    runs-on: ubuntu-latest
    steps:
      - name: 1 · Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: 2 · Instalar dependencias
        run: npm install

      - name: 3 · Ejecutar tests
        run: npm test

  build-and-push:
    name: Build and push Docker image
    needs: deps-and-test
    runs-on: ubuntu-latest
    steps:
      - name: 1 · Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: 2 · Iniciar sesión en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 3 · Armar la imagen y publicarla
        run: |
          IMAGEN="${{ secrets.DOCKER_USERNAME }}/${{ inputs.image-name }}"
          docker build \
            -t "${IMAGEN}:${{ inputs.image-tag }}" \
            -t "${IMAGEN}:latest" \
            .
        docker push --all-tags "${IMAGEN}"
